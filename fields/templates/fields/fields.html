{% extends 'base.html' %}

{% block title %}Browse Fields{% endblock %}

{% block content %}
<div class="search-header mb-4">
    <h2>🏟️ Browse Sports Fields</h2>
    <p class="text-muted">Find the perfect field for your game</p>
</div>

<!-- Enhanced Search and Filter -->
<div class="card search-filter-card mb-4">
    <div class="card-body">
        <form method="get" class="search-form">
            <div class="row g-3">
                <!-- Quick Search -->
                <div class="col-md-4">
                    <div class="search-input-group">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" name="search" class="form-control search-input" 
                               placeholder="Search fields, locations..." 
                               value="{{ request.GET.search }}">
                    </div>
                </div>
                
                <!-- Field Type Filter -->
                <div class="col-md-2">
                    <select name="field_type" class="form-control">
                        <option value="">All Sports</option>
                        {% for type in field_types %}
                            <option value="{{ type.0 }}" {% if request.GET.field_type == type.0 %}selected{% endif %}>
                                {{ type.1 }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Availability Filter -->
                <div class="col-md-2">
                    <select name="availability" class="form-control">
                        <option value="">Free & Paid</option>
                        {% for avail in availability_types %}
                            <option value="{{ avail.0 }}" {% if request.GET.availability == avail.0 %}selected{% endif %}>
                                {{ avail.1 }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Location Filter -->
                <div class="col-md-2">
                    <input type="text" name="location" class="form-control" 
                           placeholder="Location" value="{{ request.GET.location }}">
                </div>
                
                <!-- Action Buttons -->
                <div class="col-md-2">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-search me-1"></i>Search
                        </button>
                        <a href="{% url 'fields:fields' %}" class="btn btn-outline-secondary" title="Clear">
                            <i class="fas fa-times"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Advanced Filters Toggle -->
            <div class="advanced-filters mt-3" id="advancedFilters" style="display: none;">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Price Range (৳/hour)</label>
                        <div class="d-flex gap-2">
                            <input type="number" name="min_price" class="form-control" 
                                   placeholder="Min" value="{{ request.GET.min_price }}">
                            <input type="number" name="max_price" class="form-control" 
                                   placeholder="Max" value="{{ request.GET.max_price }}">
                        </div>
                    </div>
                    
                    <div class="col-md-2">
                        <label class="form-label">Min Capacity</label>
                        <input type="number" name="capacity" class="form-control" 
                               placeholder="Players" value="{{ request.GET.capacity }}">
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label">Available Date</label>
                        <input type="date" name="available_date" class="form-control" 
                               value="{{ request.GET.available_date }}"
                               min="{{ today|date:'Y-m-d' }}">
                    </div>
                    
                    <div class="col-md-2">
                        <label class="form-label">Available Time</label>
                        <input type="time" name="available_time" class="form-control" 
                               value="{{ request.GET.available_time }}">
                    </div>
                    
                    <div class="col-md-2">
                        <label class="form-label">Special</label>
                        <div class="form-check">
                            <input type="checkbox" name="women_only" class="form-check-input" 
                                   {% if request.GET.women_only %}checked{% endif %}>
                            <label class="form-check-label">Women Only</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <button type="button" class="btn btn-link" onclick="toggleAdvancedFilters()">
                    <i class="fas fa-sliders-h me-1"></i>
                    <span id="advancedToggleText">Advanced Filters</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Results Summary -->
<div class="results-summary mb-3">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <strong>{{ fields.count }}</strong> field{{ fields.count|pluralize }} found
            {% if request.GET.search %}
                for "<em>{{ request.GET.search }}</em>"
            {% endif %}
        </div>
        <div class="view-toggles">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-primary btn-sm active" 
                        onclick="switchView('grid')" id="gridViewBtn">
                    <i class="fas fa-th"></i> Grid
                </button>
                <button type="button" class="btn btn-outline-primary btn-sm" 
                        onclick="switchView('list')" id="listViewBtn">
                    <i class="fas fa-list"></i> List
                </button>
            </div>
        </div>
    </div>
</div>
